name: Deploy Web to Vercel

# Production URL: https://firstcalllaw.vercel.app/
# Project: https://vercel.com/akhimass-projects/firstcall
#
# Preferred: connect Git on that Vercel project (root directory: web).
# This workflow only runs when akhimass-projects IDs are set in GitHub secrets.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to firstcalllaw
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
