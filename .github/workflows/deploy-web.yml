name: Deploy Web to Vercel

# Optional: use this if you deploy via GitHub Actions + deploy hook token.
# For native Vercel Git deploys (akhimass-projects/firstcall), Vercel handles
# pushes automatically — you can disable or delete this workflow.

on:
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy from GitHub
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
